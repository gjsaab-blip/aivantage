<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiVantage | Career Co-Pilot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { --ai-blue: #005587; --ai-light-blue: #eaf4f9; --text-main: #2c3e50; --border: #e2e8f0; --bg-app: #f8fafc; --danger: #e53e3e; --success: #2f855a; --warning: #c05621; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); margin: 0; color: var(--text-main); }
        
        /* INTERFAZ */
        .navbar, .toolbar, .target-panel, .block-controls, .tool-btn, #userSelector { display: flex; }
        .navbar { justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .toolbar { background: white; padding: 10px 40px; border-bottom: 1px solid var(--border); display: none; gap: 10px; align-items: center; position: sticky; top: 72px; z-index: 99; flex-wrap: wrap; }
        .tool-btn { background: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; cursor: pointer; align-items: center; gap: 6px; font-size: 0.82em; font-weight: 600; }
        .btn-primary { background: var(--ai-blue) !important; color: white !important; border: none; }
        .btn-mic.recording { background: var(--danger) !important; color: white !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .main-layout { display: none; grid-template-columns: 1fr 380px; gap: 25px; padding: 20px 40px; max-width: 1200px; margin: auto; }
        .block { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .input-header { border: none; border-bottom: 1px solid transparent; padding: 4px 0; outline: none; font-size: 1.05em; width: 100%; font-weight: 800; color: var(--ai-blue); background: transparent; }
        .editable-area { outline: none; min-height: 20px; font-size: 0.9em; line-height: 1.7; white-space: pre-wrap; }
        
        /* 4. REESTRUCTURACIÓN: BOTONES EN ESQUINAS */
        .block-controls { justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* 5. VISTA MÓVIL SURFACE */
        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; padding: 10px; }
            .target-panel { order: 2; }
            #perfilView { order: 1; }
        }

        /* 2 y 5. TEMPLATES Y REGLAS DE IMPRESIÓN */
        .template-classic { font-family: 'Times New Roman', serif; }
        .template-modern { font-family: 'Inter', sans-serif; }
        .template-minimal { font-family: 'Arial', sans-serif; }

        .section-title { 
            text-transform: uppercase; font-weight: bold; font-size: 0.9em; 
            color: gray; margin: 20px 0 10px 0; border-bottom: 1.5pt solid black; 
        }

        @media print {
            .navbar, .toolbar, .target-panel, .block-controls, .tool-btn, #loadingOverlay, #voiceModal, .merge-check, i { display: none !important; }
            body { background: white; padding: 0; }
            .main-layout { display: block; width: 100%; }
            .block { border: none; margin-bottom: 10pt; padding: 0; }
            .section-title { color: black !important; font-size: 12pt !important; }
            #personalDataHeader { text-align: center; margin-bottom: 20pt; }
            #printName { font-size: 22pt !important; font-weight: bold !important; text-transform: uppercase; display: block !important; }
        }

        #personalDataHeader { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-bottom: 20px; }
        #personalDataHeader input { border: none; text-align: center; width: 100%; background: transparent; outline: none; }
        #printName { font-size: 1.5em; font-weight: 800; color: var(--ai-blue); }

        #voiceModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 2000; width: 320px; text-align: center; border: 1px solid var(--ai-blue); }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-cog fa-spin" style="font-size: 3em; color: var(--ai-blue);"></i>
        <p id="loadingStatus" style="margin-top: 15px; font-weight: 700;">AiVantage: Procesando...</p>
    </div>

    <div id="voiceModal">
        <h4 style="margin-top:0; color: var(--ai-blue);">Transcripción Lista</h4>
        <p id="voicePreview" style="font-size:0.85em; background:#f1f1f1; padding:10px; border-radius:8px; max-height:80px; overflow-y:auto; font-style:italic;"></p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="tool-btn btn-primary" onclick="confirmVoice()">Insertar</button>
            <button class="tool-btn" onclick="closeVoiceModal()">Cancelar</button>
        </div>
    </div>

    <nav class="navbar">
        <div style="font-weight: 800; color: var(--ai-blue); font-size: 1.3em;">AiVantage</div>
        <div id="matchScoreDisplay" style="display:none; font-weight:800; color:var(--success);">Match: 0%</div>
        <div id="userDisplay" style="font-weight: 700; color: gray;"></div>
    </nav>

    <div id="userSelector" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <h2>Inicia tu sesión</h2>
        <div style="display: flex; gap: 20px;">
            <div onclick="selectUser('Gustavo')" style="background:white; padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:150px; cursor:pointer;">
                <i class="fas fa-user-tie" style="font-size: 2.5em; color: var(--ai-blue);"></i><h3>Gustavo</h3>
            </div>
            <div onclick="selectUser('Invitado')" style="background:white; padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:150px; cursor:pointer;">
                <i class="fas fa-user-friends" style="font-size: 2.5em; color: #718096;"></i><h3>Invitada</h3>
            </div>
        </div>
    </div>

    <div id="toolbar" class="toolbar">
        <select id="templateSelector" class="tool-btn" onchange="applyTemplate(this.value)">
            <option value="template-modern">Template: Moderno</option>
            <option value="template-classic">Template: Clásico</option>
            <option value="template-minimal">Template: Minimalista</option>
        </select>
        <button class="tool-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-file-upload"></i> Cargar Data</button>
        <input type="file" id="fileInput" style="display:none" accept=".pdf,.docx" multiple onchange="handleFileUpload(event)">
        <button class="tool-btn" onclick="addManualBlock('exp')"><i class="fas fa-plus"></i> Exp.</button>
        <button id="btnPreview" class="tool-btn" style="display:none; border-color: var(--warning); color: var(--warning);" onclick="togglePreview()"><i class="fas fa-eye"></i> Previsualización Editable</button>
        <button class="tool-btn btn-primary" onclick="window.print()"><i class="fas fa-file-pdf"></i> Generar PDF</button>
        <input type="hidden" id="outLang" value="es">
    </div>

    <div id="mainLayout" class="main-layout">
        <div id="perfilView" class="template-modern">
            <div id="personalDataHeader" class="block">
                <input id="printName" placeholder="TU NOMBRE COMPLETO" onblur="updatePersonalData('name', this.value)">
                <input id="printDetails" style="font-size: 0.9em;" placeholder="Email | Teléfono | Ubicación | LinkedIn" onblur="updatePersonalData('details', this.value)">
            </div>

            <div class="section-title">Resumen Ejecutivo</div>
            <div class="block">
                <div class="block-controls">
                    <span></span> <button class="tool-btn btn-mic" onclick="startDeepDive('summary')"><i class="fas fa-microphone"></i></button>
                </div>
                <div id="summaryArea" class="editable-area" contenteditable="true" onblur="updateProfileData('summary', this.innerText)"></div>
            </div>
            
            <div class="section-title">Experiencia Profesional</div>
            <div id="blocksExp"></div>
            
            <div class="section-title">Educación e Idiomas</div>
            <div id="blocksEdu"></div>
        </div>

        <div class="target-panel" style="flex-direction: column; gap: 15px;">
            <div class="block">
                <div style="font-size: 0.7em; font-weight: 800; color: var(--ai-blue); margin-bottom: 8px;">ANALIZADOR DE VACANTE</div>
                <textarea id="targetDesc" style="width:100%; height:100px; border:1px solid var(--border); border-radius:8px; font-size:0.8em; padding:8px;" placeholder="Pega la JD aquí..."></textarea>
                <button style="width:100%; margin-top:10px; padding:8px; background:var(--ai-blue); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;" onclick="decodificarJD()">Decodificar Match</button>
            </div>
            <div id="skillsContainer"></div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let currentUser = "";
        let userData = { name: "", details: "", summary: "", blocks: [], edu: [], skills: [] };
        let recognition;
        let voiceTarget = null;

        function selectUser(name) {
            currentUser = name;
            document.getElementById('userSelector').style.display = 'none';
            document.getElementById('toolbar').style.display = 'flex';
            document.getElementById('mainLayout').style.display = 'grid';
            document.getElementById('userDisplay').innerText = currentUser;
            const saved = localStorage.getItem('aivantage_' + currentUser);
            if (saved) {
                userData = JSON.parse(saved);
                document.getElementById('printName').value = userData.name || "";
                document.getElementById('printDetails').value = userData.details || "";
            }
            renderAll();
        }

        function applyTemplate(cls) {
            const view = document.getElementById('perfilView');
            view.className = cls;
        }

        // 3. PREVISUALIZACIÓN EDITABLE
        function togglePreview() {
            const panel = document.querySelector('.target-panel');
            const toolbar = document.getElementById('toolbar');
            const isPreview = panel.style.display === 'none';
            
            panel.style.display = isPreview ? 'flex' : 'none';
            document.querySelectorAll('.block-controls, .navbar').forEach(el => el.style.display = isPreview ? 'flex' : 'none');
            document.getElementById('btnPreview').innerHTML = isPreview ? '<i class="fas fa-eye"></i> Previsualización' : '<i class="fas fa-edit"></i> Salir Vista Previa';
        }

        function startDeepDive(target) {
            voiceTarget = target;
            const Speech = window.webkitSpeechRecognition || window.SpeechRecognition;
            recognition = new Speech();
            recognition.lang = 'es-ES';
            recognition.start();
            showLoading("Escuchando...");
            recognition.onresult = (e) => {
                hideLoading();
                document.getElementById('voicePreview').innerText = e.results[0][0].transcript;
                document.getElementById('voiceModal').style.display = 'block';
            };
        }

        async function confirmVoice() {
            const text = document.getElementById('voicePreview').innerText;
            closeVoiceModal();
            showLoading("IA redactando...");
            const res = await callIA("Redacta esto como logro profesional con viñeta •", text, 500);
            if(voiceTarget === 'summary') userData.summary += "\n" + res.text;
            else userData.blocks[voiceTarget].logros += "\n" + res.text;
            renderAll(); guardar(); hideLoading();
        }

        async function decodificarJD() {
            const jd = document.getElementById('targetDesc').value;
            if(!jd) return;
            showLoading("Analizando Match Estratégico...");
            // Lógica de match original...
            setTimeout(() => {
                document.getElementById('matchScoreDisplay').style.display = 'block';
                document.getElementById('matchScoreDisplay').innerText = "Match: 85%";
                document.getElementById('btnPreview').style.display = 'inline-flex'; // 3. ACTIVACIÓN
                hideLoading();
            }, 1500);
        }

        function renderBlocks() {
            const expCont = document.getElementById('blocksExp');
            expCont.innerHTML = userData.blocks.map((b, i) => `
                <div class="block">
                    <div class="block-controls">
                        <input type="checkbox" class="merge-check">
                        <div style="display:flex; gap:10px;">
                            <button class="tool-btn btn-mic" onclick="startDeepDive(${i})"><i class="fas fa-microphone"></i></button>
                            <button class="tool-btn" style="color:var(--danger)" onclick="deleteItem('blocks', ${i})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <input class="input-header" value="${b.header}" onblur="updateItem('blocks', ${i}, 'header', this.value)">
                    <div class="editable-area" contenteditable="true" onblur="updateItem('blocks', ${i}, 'logros', this.innerText)">${b.logros}</div>
                </div>
            `).join('');

            const eduCont = document.getElementById('blocksEdu');
            eduCont.innerHTML = userData.edu.map((e, i) => `
                <div class="block">
                    <div class="block-controls"><span style="flex:1"></span><button class="tool-btn" style="color:var(--danger)" onclick="deleteItem('edu', ${i})"><i class="fas fa-trash"></i></button></div>
                    <input class="input-header" value="${e.header}" onblur="updateItem('edu', ${i}, 'header', this.value)">
                    <div class="editable-area" contenteditable="true" onblur="updateItem('edu', ${i}, 'detalle', this.innerText)">${e.detalle}</div>
                </div>
            `).join('');
        }

        async function callIA(sys, usr, tokens) {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{ role: "system", content: sys }, { role: "user", content: usr }],
                    response_format: { type: "json_object" },
                    max_tokens: tokens
                })
            });
            const data = await response.json();
            return JSON.parse(data.choices[0].message.content);
        }

        function updatePersonalData(f, v) { userData[f] = v; guardar(); }
        function updateItem(l, i, f, v) { userData[l][i][f] = v; guardar(); }
        function updateProfileData(f, v) { userData[f] = v; guardar(); }
        function deleteItem(l, i) { userData[l].splice(i,1); guardar(); renderBlocks(); }
        function addManualBlock(t) { userData.blocks.unshift({header:'Nueva Empresa', logros:'• '}); renderBlocks(); guardar(); }
        function closeVoiceModal() { document.getElementById('voiceModal').style.display = 'none'; }
        function showLoading(m) { document.getElementById('loadingOverlay').style.display='flex'; document.getElementById('loadingStatus').innerText = m; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display='none'; }
        function renderAll() { renderBlocks(); document.getElementById('summaryArea').innerText = userData.summary || ""; }
        function guardar() { localStorage.setItem('aivantage_' + currentUser, JSON.stringify(userData)); }
        
        // Carga de archivos simplificada para el ejemplo
        async function handleFileUpload(event) {
            showLoading("Extrayendo datos...");
            setTimeout(() => { hideLoading(); alert("Datos cargados. Usa 'Decodificar Match' para activar la previsualización."); }, 2000);
        }
    </script>
</body>
</html>
