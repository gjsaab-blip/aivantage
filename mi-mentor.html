<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiVantage | Career Co-Pilot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { --ai-blue: #005587; --ai-light-blue: #eaf4f9; --text-main: #2c3e50; --border: #e2e8f0; --bg-app: #f8fafc; --danger: #e53e3e; --success: #2f855a; --warning: #c05621; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); margin: 0; color: var(--text-main); }
        .navbar, .toolbar, .tabs, .target-panel, .block-controls, .tool-btn, .tab, #userSelector { display: flex; }
        .navbar { justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .toolbar { background: white; padding: 10px 40px; border-bottom: 1px solid var(--border); display: none; gap: 10px; align-items: center; position: sticky; top: 72px; z-index: 99; flex-wrap: wrap; }
        .tool-btn { background: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; cursor: pointer; align-items: center; gap: 6px; font-size: 0.82em; font-weight: 600; }
        .btn-primary { background: var(--ai-blue) !important; color: white !important; border: none; }
        .btn-mic.recording { background: var(--danger) !important; color: white !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        /* MODALES */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        .main-layout { display: none; grid-template-columns: 1fr 380px; gap: 25px; padding: 20px 40px; max-width: 1200px; margin: auto; }
        .block { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        
        /* ESTILOS ENCABEZADO PERSONALIZADO */
        .personal-data-container { text-align: center; border: none !important; margin-bottom: 30px !important; }
        .input-name { border: none; outline: none; font-size: 26px; font-weight: 800; color: var(--ai-blue); width: 100%; text-align: center; text-transform: uppercase; background: transparent; }
        .contact-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
        .input-contact { border: none; outline: none; font-size: 14px; color: #4a5568; background: transparent; text-align: center; min-width: 150px; }
        .input-contact:focus, .input-name:focus { border-bottom: 1px solid var(--ai-blue); }

        .input-header { border: none; border-bottom: 1px solid transparent; padding: 4px 0; outline: none; font-size: 1.05em; width: 100%; font-weight: 800; color: var(--ai-blue); background: transparent; }
        .editable-area { outline: none; min-height: 20px; font-size: 0.9em; line-height: 1.7; white-space: pre-wrap; }
        
        .skill-tag { padding: 4px 10px; border-radius: 6px; font-size: 0.75em; font-weight: 700; margin: 2px; display: inline-block; border: 1px solid transparent; }
        .skill-tech { background: #ebf8ff; color: #2b6cb0; border-color: #bee3f8; }
        .skill-soft { background: #f0fff4; color: #2f855a; border-color: #c6f6d5; }
        .skill-lang { background: #fffaf0; color: #9c4221; border-color: #feebc8; }
        .skill-gap { background: #fff5f5; color: #c53030; border-color: #feb2b2; text-decoration: underline; }

        .block-controls { justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .section-title { text-transform: uppercase; font-weight: bold; font-size: 0.9em; color: gray; margin: 20px 0 10px 0; border-bottom: 1.5pt solid black; display: none; }

        @media print {
            .navbar, .toolbar, .tabs, .target-panel, .block-controls, .tool-btn, #loadingOverlay, .merge-check, .modal-overlay, .btn-mic, #btnPreview { display: none !important; }
            body { background: white; padding: 0; }
            .main-layout { display: block; width: 100%; padding: 0; }
            .block { border: none; margin-bottom: 10pt; padding: 0; }
            .section-title { display: block !important; color: black !important; font-size: 12pt !important; border-bottom: 1.5pt solid black !important; }
            .input-name { font-size: 22pt !important; color: black !important; text-align: center; }
            .input-contact { font-size: 10pt !important; color: black !important; }
        }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-cog fa-spin" style="font-size: 3em; color: var(--ai-blue);"></i>
        <p id="loadingStatus" style="margin-top: 15px; font-weight: 700;">AiVantage: Procesando...</p>
    </div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--ai-blue); margin-top: 0;">Configuración</h3>
            <p style="font-size: 0.8em; color: gray;">Introduce tu API Key de OpenAI para habilitar la IA. Se guardará solo en este navegador.</p>
            <input type="password" id="apiKeyInput" style="width: 90%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 15px;" placeholder="sk-proj-...">
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="tool-btn btn-primary" onclick="saveApiKey()">Guardar</button>
                <button class="tool-btn" onclick="closeSettings()">Cerrar</button>
            </div>
        </div>
    </div>

    <div id="voiceModal" class="modal-overlay">
        <div class="modal-content">
            <h4 style="margin-top:0; color: var(--ai-blue);">Transcripción Lista</h4>
            <p id="voicePreview" style="font-size:0.85em; background:#f1f1f1; padding:10px; border-radius:8px; max-height:80px; overflow-y:auto; font-style:italic;"></p>
            <p id="voiceTargetLabel" style="font-size:0.8em; font-weight:700;"></p>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="tool-btn btn-primary" onclick="processVoiceAction()">Insertar</button>
                <button class="tool-btn" onclick="closeVoiceModal()">Cancelar</button>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div style="font-weight: 800; color: var(--ai-blue); font-size: 1.3em;">AiVantage</div>
        <div id="matchScoreDisplay" style="display:none; font-weight:800; color:var(--success);">Match: 0%</div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="userDisplay" style="font-weight: 700; color: gray;"></div>
            <i class="fas fa-cog" style="cursor: pointer; color: gray; font-size: 1.2em;" onclick="openSettings()"></i>
        </div>
    </nav>

    <div id="userSelector" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <h2>Inicia tu sesión</h2>
        <div style="display: flex; gap: 20px;">
            <div onclick="selectUser('Gustavo')" style="background:white; padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:150px; cursor:pointer;"><i class="fas fa-user-tie" style="font-size: 2.5em; color: var(--ai-blue);"></i><h3>Gustavo</h3></div>
            <div onclick="selectUser('Invitado')" style="background:white; padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:150px; cursor:pointer;"><i class="fas fa-user-friends" style="font-size: 2.5em; color: #718096;"></i><h3>Invitada</h3></div>
        </div>
    </div>

    <div id="toolbar" class="toolbar">
        <select id="templateSelector" class="tool-btn" onchange="applyTemplate(this.value)">
            <option value="template-modern">Moderno</option>
            <option value="template-classic">Clásico</option>
            <option value="template-minimal">Minimalista</option>
        </select>
        <button class="tool-btn btn-mic" id="btnDeepDiveGeneral" onclick="startDeepDive('summary')"><i class="fas fa-microphone"></i> Deep Dive</button>
        <button class="tool-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-file-upload"></i> Cargar CVs</button>
        <input type="file" id="fileInput" style="display:none" accept=".pdf,.docx" multiple onchange="handleFileUpload(event)">
        <button class="tool-btn" onclick="addManualBlock('exp')"><i class="fas fa-plus"></i> Exp.</button>
        <button class="tool-btn" onclick="addManualBlock('edu')"><i class="fas fa-graduation-cap"></i> Edu.</button>
        <button id="btnCombinar" class="tool-btn btn-primary" style="display:none" onclick="combinarBloques()"><i class="fas fa-object-group"></i> Combinar (IA)</button>
        <select id="outLang" class="tool-btn"><option value="es">ESP</option><option value="en">ENG</option></select>
        <button id="btnPreview" class="tool-btn" style="display:none; color: var(--warning); border-color: var(--warning);" onclick="togglePreview()"><i class="fas fa-eye"></i> Previsualización</button>
        <button class="tool-btn btn-primary" onclick="window.print()"><i class="fas fa-file-pdf"></i> Generar CV Final</button>
    </div>

    <div id="mainLayout" class="main-layout">
        <div id="perfilView" class="template-modern">
            <div id="personalDataHeader" class="block personal-data-container">
                <input id="printName" class="input-name" placeholder="NOMBRE COMPLETO" onblur="updatePersonalData('name', this.value)">
                <div class="contact-row">
                    <input id="inputEmail" class="input-contact" placeholder="📧 Email" onblur="updatePersonalData('email', this.value)">
                    <input id="inputPhone" class="input-contact" placeholder="📞 Teléfono" onblur="updatePersonalData('phone', this.value)">
                    <input id="inputLinkedin" class="input-contact" placeholder="🔗 LinkedIn" onblur="updatePersonalData('linkedin', this.value)">
                </div>
            </div>

            <div class="section-title">Resumen Ejecutivo</div>
            <div class="block">
                <div class="block-controls"><span></span><button class="tool-btn btn-mic" onclick="startDeepDive('summary')"><i class="fas fa-microphone"></i></button></div>
                <div id="summaryArea" class="editable-area" contenteditable="true" onblur="updateProfileData('summary', this.innerText)"></div>
            </div>
            <div class="section-title">Experiencia Profesional</div><div id="blocksExp"></div>
            <div class="section-title">Educación</div><div id="blocksEdu"></div>
        </div>

        <div id="targetPanel" class="target-panel" style="flex-direction: column; gap: 15px;">
            <div class="block">
                <div style="font-size: 0.7em; font-weight: 800; color: var(--ai-blue); margin-bottom: 8px;">ANALIZADOR DE VACANTE</div>
                <textarea id="targetDesc" style="width:100%; height:100px; border:1px solid var(--border); border-radius:8px; font-size:0.8em; padding:8px;" placeholder="Pega la JD aquí..."></textarea>
                <button style="width:100%; margin-top:10px; padding:8px; background:var(--ai-blue); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;" onclick="decodificarJD()">Decodificar Match</button>
            </div>
            <div id="skillsContainer"></div>
            <div id="gapAlert" style="display:none; padding:12px; background:#fff5f5; border-radius:8px; border:1px solid #feb2b2; font-size:0.8em; color:#c53030;"></div>
        </div>
    </div>

    <script>
        let currentUser = "";
        let userData = { name: "", email: "", phone: "", linkedin: "", summary: "", blocks: [], edu: [], skills: [] };
        let recognition;
        let lastTranscript = "";
        let currentVoiceTarget = "";

        // GESTIÓN DE API KEY SEGURA
        function openSettings() { 
            document.getElementById('settingsModal').style.display = 'flex';
            document.getElementById('apiKeyInput').value = localStorage.getItem('aivantage_api_key') || "";
        }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            localStorage.setItem('aivantage_api_key', key);
            alert("Configuración guardada correctamente.");
            closeSettings();
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-ES';
            recognition.onresult = (event) => { for (let i = event.resultIndex; i < event.results.length; ++i) { if (event.results[i].isFinal) lastTranscript += event.results[i][0].transcript; } };
            recognition.onerror = (event) => { document.querySelectorAll('.btn-mic').forEach(b => b.classList.remove('recording')); alert("Error de micrófono: " + event.error); };
        }

        function applyTemplate(cls) { document.getElementById('perfilView').className = cls; }
        
        function togglePreview() {
            const panel = document.getElementById('targetPanel');
            const isHidden = panel.style.display === 'none';
            panel.style.display = isHidden ? 'flex' : 'none';
            document.querySelectorAll('.block-controls, .navbar').forEach(el => el.style.display = isHidden ? 'flex' : 'none');
            document.getElementById('btnPreview').innerHTML = isHidden ? '<i class="fas fa-eye"></i> Previsualización' : '<i class="fas fa-edit"></i> Salir Vista Previa';
        }

        function startDeepDive(target) {
            currentVoiceTarget = target;
            const btn = event.currentTarget;
            if (btn.classList.contains('recording')) {
                recognition.stop();
                btn.classList.remove('recording');
                setTimeout(() => { if(lastTranscript.trim()) showVoiceDecision(); }, 500);
            } else {
                lastTranscript = "";
                recognition.start();
                btn.classList.add('recording');
            }
        }

        function showVoiceDecision() {
            document.getElementById('voicePreview').innerText = `"${lastTranscript}"`;
            document.getElementById('voiceTargetLabel').innerText = `Insertando en sección...`;
            document.getElementById('voiceModal').style.display = 'flex';
        }

        async function processVoiceAction() {
            closeVoiceModal(); showLoading("IA redactando...");
            const res = await callIA(`Convierte esto en logros profesionales. JSON: {text:''}`, lastTranscript, 500);
            if(currentVoiceTarget === 'summary') userData.summary += "\n" + res.text;
            else if(typeof currentVoiceTarget === 'number') userData.blocks[currentVoiceTarget].logros += "\n" + res.text;
            renderAll(); guardar(); hideLoading();
        }

        async function decodificarJD() {
            const jd = document.getElementById('targetDesc').value;
            if(!jd) return;
            showLoading("Analizando Match...");
            try {
                const promptPerfil = `RESUMEN: ${userData.summary}. EXP: ${JSON.stringify(userData.blocks)}. EDU: ${JSON.stringify(userData.edu)}`;
                const res = await callIA(`Compara perfil con JD. JSON: {score:85, match_skills:[{name:'', type:'tech'}], gaps:[{name:'', advice:''}]}`, `PERFIL: ${promptPerfil} \n JD: ${jd}`, 2000);
                document.getElementById('matchScoreDisplay').innerText = `Match: ${res.score}%`;
                document.getElementById('matchScoreDisplay').style.display = 'block';
                document.getElementById('btnPreview').style.display = 'inline-flex';
                let html = "";
                res.match_skills.forEach(s => html += `<span class="skill-tag skill-${s.type}">${s.name}</span>`);
                document.getElementById('skillsContainer').innerHTML = html;
                if(res.gaps && res.gaps.length > 0) {
                    document.getElementById('gapAlert').style.display = 'block';
                    document.getElementById('gapAlert').innerHTML = res.gaps.map(g => `• ${g.name}: ${g.advice}`).join('<br>');
                }
            } catch(e) { alert("Error: " + e.message); }
            hideLoading();
        }

        async function combinarBloques() {
            const seleccionados = Array.from(document.querySelectorAll('.merge-check:checked')).map(cb => parseInt(cb.dataset.index));
            showLoading("Combinando...");
            const dataToMerge = seleccionados.map(idx => userData.blocks[idx]);
            const res = await callIA(`Combina bloques. JSON: {header:'', logros:''}`, JSON.stringify(dataToMerge), 1200);
            seleccionados.sort((a,b) => b-a).forEach(idx => userData.blocks.splice(idx, 1));
            userData.blocks.unshift(res);
            guardar(); renderAll(); hideLoading();
        }

        async function handleFileUpload(event) {
            const files = event.target.files; showLoading("Extrayendo datos...");
            try {
                for (let file of files) {
                    const reader = new FileReader();
                    const text = await new Promise((resolve) => {
                        reader.onload = async function() {
                            if (file.type === "application/pdf") {
                                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                                let fullT = ""; for (let i=1; i<=pdf.numPages; i++) { const p = await pdf.getPage(i); const c = await p.getTextContent(); fullT += c.items.map(it => it.str).join(" "); }
                                resolve(fullT);
                            } else {
                                const res = await mammoth.extractRawText({arrayBuffer: this.result});
                                resolve(res.value);
                            }
                        };
                        reader.readAsArrayBuffer(file);
                    });
                    const res = await callIA(`Extrae CV. JSON: {summary:'', blocks:[{header:'', logros:''}], edu:[{header:'', detalle:''}], skills:[{name:'', type:'tech'}]}`, text, 1500);
                    if(res.summary) userData.summary = (userData.summary + "\n" + res.summary).trim();
                    if(res.blocks) userData.blocks = [...res.blocks, ...userData.blocks];
                    if(res.edu) userData.edu = [...res.edu, ...userData.edu];
                    if(res.skills) userData.skills = [...res.skills, ...userData.skills];
                    guardar(); renderAll();
                }
            } catch(e) { alert("Error: " + e.message); }
            hideLoading();
            event.target.value = '';
        }

        async function callIA(sys, usr, tokens) {
            const key = localStorage.getItem('aivantage_api_key');
            if(!key) { alert("Por favor, configura tu API Key en el icono de ajustes (⚙️)"); hideLoading(); throw new Error("API Key faltante"); }
            
            const lang = document.getElementById('outLang').value;
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{ role: "system", content: `ERES GUSTAVO. Responde en ${lang}. JSON obligatorio. Logros con •. ` + sys }, { role: "user", content: usr }],
                    response_format: { type: "json_object" },
                    max_tokens: tokens,
                    temperature: 0.3
                })
            });
            const textResponse = await response.text();
            if (!response.ok) throw new Error(`Error ${response.status}: ${textResponse}`);
            const data = JSON.parse(textResponse);
            return JSON.parse(data.choices[0].message.content);
        }

        function renderBlocks() {
            const expCont = document.getElementById('blocksExp');
            expCont.innerHTML = userData.blocks.map((b, i) => `
                <div class="block">
                    <div class="block-controls">
                        <input type="checkbox" class="merge-check" data-index="${i}" onchange="toggleMergeBtn()">
                        <div style="display:flex; gap:5px;">
                            <button class="tool-btn btn-mic" onclick="startDeepDive(${i})"><i class="fas fa-microphone"></i></button>
                            <button style="border:none; background:none; color:gray; cursor:pointer;" onclick="deleteItem('blocks', ${i})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <input class="input-header" value="${b.header || ''}" onblur="updateItem('blocks', ${i}, 'header', this.value)">
                    <div class="editable-area" contenteditable="true" onblur="updateItem('blocks', ${i}, 'logros', this.innerText)">${b.logros || ''}</div>
                </div>`).join('');
            
            const eduCont = document.getElementById('blocksEdu');
            eduCont.innerHTML = userData.edu.map((e, i) => `
                <div class="block">
                    <div class="block-controls"><span></span><button style="border:none; background:none; color:gray; cursor:pointer;" onclick="deleteItem('edu', ${i})"><i class="fas fa-trash"></i></button></div>
                    <input class="input-header" value="${e.header || ''}" onblur="updateItem('edu', ${i}, 'header', this.value)">
                    <div class="editable-area" contenteditable="true" onblur="updateItem('edu', ${i}, 'detalle', this.innerText)">${e.detalle || ''}</div>
                </div>`).join('');
            
            if (Array.isArray(userData.skills)) {
                document.getElementById('skillsContainer').innerHTML = userData.skills.map(s => `<span class="skill-tag skill-${s.type || 'tech'}">${s.name}</span>`).join('');
            }
        }

        function toggleMergeBtn() {
            const count = document.querySelectorAll('.merge-check:checked').length;
            document.getElementById('btnCombinar').style.display = count >= 2 ? 'inline-flex' : 'none';
        }

        function selectUser(name) {
            currentUser = name;
            document.getElementById('userSelector').style.display = 'none';
            document.getElementById('toolbar').style.display = 'flex';
            document.getElementById('mainLayout').style.display = 'grid';
            document.getElementById('userDisplay').innerText = currentUser;
            const saved = localStorage.getItem('aivantage_' + currentUser);
            if (saved) {
                userData = JSON.parse(saved);
                document.getElementById('printName').value = userData.name || "";
                document.getElementById('inputEmail').value = userData.email || "";
                document.getElementById('inputPhone').value = userData.phone || "";
                document.getElementById('inputLinkedin').value = userData.linkedin || "";
            }
            renderAll();
        }

        function updatePersonalData(f, v) { userData[f] = v; guardar(); }
        function updateItem(l, i, f, v) { userData[l][i][f] = v; guardar(); }
        function updateProfileData(f, v) { userData[f] = v; guardar(); }
        function deleteItem(l, i) { userData[l].splice(i,1); guardar(); renderBlocks(); }
        function addManualBlock(t) { 
            if(t==='exp') userData.blocks.unshift({header:'Nueva Empresa', logros:'• '});
            else userData.edu.unshift({header:'Nueva Educación', detalle:''});
            renderBlocks(); guardar(); 
        }
        function closeVoiceModal() { document.getElementById('voiceModal').style.display = 'none'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function showLoading(m) { document.getElementById('loadingOverlay').style.display='flex'; document.getElementById('loadingStatus').innerText = m; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display='none'; }
        function renderAll() { renderBlocks(); document.getElementById('summaryArea').innerText = userData.summary || ""; }
        function guardar() { localStorage.setItem('aivantage_' + currentUser, JSON.stringify(userData)); }
    </script>
</body>
</html>
