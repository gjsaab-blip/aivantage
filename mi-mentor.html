<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUSTAVO SAAB - CV Profesional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { --ai-blue: #005587; --text-main: #2c3e50; --border: #e2e8f0; --bg-app: #f8fafc; }
        body { font-family: 'Arial', sans-serif; background: var(--bg-app); margin: 0; color: var(--text-main); }
        
        /* Interfaz Web */
        .navbar, .toolbar, .target-panel, .tool-btn, #loadingOverlay, .config-btn, .merge-check { display: flex; }
        .navbar { justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid var(--border); }
        .toolbar { background: white; padding: 10px 40px; border-bottom: 1px solid var(--border); gap: 10px; }
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; padding: 30px 40px; max-width: 1300px; margin: auto; }
        
        /* Estilos del CV (Lo que se ve en pantalla y PDF) */
        .cv-paper { background: white; padding: 40px; border-radius: 4px; box-shadow: 0 0 10px rgba(0,0,0,0.05); min-height: 1100px; }
        .cv-header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .cv-name { font-size: 24pt; font-weight: bold; text-transform: uppercase; margin: 0; }
        .cv-title { font-size: 14pt; color: #444; margin: 5px 0; }
        .cv-contact { font-size: 10pt; color: #666; }
        
        .section-title { font-size: 12pt; font-weight: bold; text-transform: uppercase; border-bottom: 1px solid #ccc; margin: 20px 0 10px 0; padding-bottom: 3px; }
        .block-header { display: flex; justify-content: space-between; font-weight: bold; font-size: 11pt; margin-bottom: 5px; }
        .logros-list { margin: 0; padding-left: 20px; list-style-type: disc; font-size: 10.5pt; line-height: 1.5; }
        .logros-list li { margin-bottom: 5px; }

        /* Botones flotantes solo en WEB */
        .block-actions { display: flex; gap: 5px; margin-top: 5px; }
        .btn-mini { padding: 4px 8px; font-size: 0.7em; cursor: pointer; border: 1px solid #ddd; border-radius: 4px; background: #fff; }
        .btn-mini:hover { background: #f0f0f0; }

        @media print {
            body { background: white; }
            .navbar, .toolbar, .target-panel, .block-actions, #loadingOverlay, #configModal, #voiceModal, .merge-check { display: none !important; }
            .main-layout { display: block; padding: 0; margin: 0; }
            .cv-paper { box-shadow: none; padding: 0; margin: 0; border: none; }
            .cv-header { border-bottom: 2px solid #000; }
            @page { margin: 1.5cm; }
        }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; }
        #configModal, #voiceModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 4000; width: 350px; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 3em; color: var(--ai-blue);"></i>
        <p id="loadingStatus" style="margin-top: 15px; font-weight: bold;">Procesando...</p>
    </div>

    <nav class="navbar">
        <div style="font-weight: 900; color: var(--ai-blue); font-size: 1.4em;">AiVantage</div>
        <div id="matchScoreDisplay" style="display:none; font-weight:800; color:green;">Match: 0%</div>
        <button class="btn-mini" onclick="openConfig()"><i class="fas fa-cog"></i> Config</button>
    </nav>

    <div class="toolbar">
        <button class="btn-mini" onclick="document.getElementById('fileInput').click()"><i class="fas fa-upload"></i> Cargar CV</button>
        <input type="file" id="fileInput" style="display:none" onchange="handleFileUpload(event)">
        <button class="btn-mini" onclick="addManualBlock()"><i class="fas fa-plus"></i> Añadir Puesto</button>
        <button class="btn-mini" style="background: var(--ai-blue); color: white;" onclick="window.print()"><i class="fas fa-file-pdf"></i> Generar PDF Final</button>
    </div>

    <div class="main-layout">
        <div class="cv-paper" id="cvContent">
            <div class="cv-header">
                <h1 class="cv-name" contenteditable="true" id="userName">GUSTAVO SAAB</h1>
                <p class="cv-title" contenteditable="true" id="userTitle">Senior Growth Marketing & Strategic Insights Lead</p>
                <p class="cv-contact" contenteditable="true" id="userContact">+353834800547 | gj.saab@gmail.com | LinkedIn: gustavojaimesaab</p>
            </div>

            <div class="section-title">Professional Summary</div>
            <div id="summaryArea" contenteditable="true" style="font-size: 10.5pt; line-height: 1.5;"></div>

            <div class="section-title">Professional Experience</div>
            <div id="experienceContainer"></div>
        </div>

        <div class="target-panel">
            <div style="background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border); width: 100%;">
                <h4 style="margin-top: 0;">Analizador de Vacante</h4>
                <textarea id="targetDesc" style="width:100%; height:150px; margin-bottom: 10px;" placeholder="Pega la JD aquí..."></textarea>
                <button onclick="decodificarJD()" style="width:100%; padding: 10px; background: var(--ai-blue); color: white; border: none; border-radius: 5px; cursor: pointer;">Analizar Puesto</button>
                <div id="skillsContainer" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <div id="configModal">
        <h4>API Key OpenAI</h4>
        <input type="password" id="apiKeyInput" style="width:100%; padding: 8px; margin-bottom: 10px;">
        <button onclick="saveApiKey()">Guardar</button>
        <button onclick="closeConfig()">Cerrar</button>
    </div>

    <div id="voiceModal">
        <h4>Transcripción</h4>
        <p id="voicePreview" style="font-size: 0.9em; background: #eee; padding: 10px;"></p>
        <button onclick="processVoiceUpdate()">Aplicar al bloque</button>
        <button onclick="closeVoiceModal()">Cancelar</button>
    </div>

    <script>
        let userData = { summary: "", blocks: [], activeIndex: -1 };
        let recognition;

        // Inicialización
        window.onload = () => {
            const saved = localStorage.getItem('aivantage_data');
            if(saved) userData = JSON.parse(saved);
            renderAll();
            setupVoice();
        };

        function setupVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(Speech) {
                recognition = new Speech();
                recognition.lang = 'es-ES';
                recognition.onresult = (e) => {
                    const text = e.results[0][0].transcript;
                    document.getElementById('voicePreview').innerText = text;
                    document.getElementById('voiceModal').style.display = 'block';
                };
            }
        }

        function startDeepDive(index) {
            userData.activeIndex = index;
            recognition.start();
            showLoading("Escuchando...");
        }

        async function processVoiceUpdate() {
            closeVoiceModal();
            const voiceText = document.getElementById('voicePreview').innerText;
            const currentBlock = userData.blocks[userData.activeIndex];
            showLoading("IA integrando cambios...");
            
            try {
                const res = await callIA(`Mejora este bloque de CV con la nueva info del usuario. JSON: {header:'', logros:''}`, 
                `ACTUAL: ${JSON.stringify(currentBlock)} \n NUEVO: ${voiceText}`, 1000);
                userData.blocks[userData.activeIndex] = res;
                renderAll();
            } catch(e) { alert(e.message); }
            hideLoading();
        }

        function renderAll() {
            // Orden cronológico automático (Intenta extraer año del header)
            userData.blocks.sort((a, b) => {
                const yearA = a.header.match(/\d{4}/) ? parseInt(a.header.match(/\d{4}/)[0]) : 0;
                const yearB = b.header.match(/\d{4}/) ? parseInt(b.header.match(/\d{4}/)[0]) : 0;
                return yearB - yearA;
            });

            document.getElementById('summaryArea').innerText = userData.summary;
            const container = document.getElementById('experienceContainer');
            container.innerHTML = "";

            userData.blocks.forEach((b, i) => {
                const bullets = b.logros.split('\n').filter(l => l.trim() !== "").map(l => `<li>${l.replace('•', '').trim()}</li>`).join('');
                container.innerHTML += `
                    <div class="block" style="margin-bottom: 20px;">
                        <div class="block-header">
                            <span contenteditable="true" onblur="updateBlock(${i}, 'header', this.innerText)">${b.header}</span>
                        </div>
                        <ul class="logros-list" contenteditable="true" onblur="updateBlock(${i}, 'logros', this.innerText)">
                            ${bullets}
                        </ul>
                        <div class="block-actions">
                            <button class="btn-mini" onclick="startDeepDive(${i})"><i class="fas fa-microphone"></i> Deep Dive</button>
                            <button class="btn-mini" onclick="deleteBlock(${i})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            localStorage.setItem('aivantage_data', JSON.stringify(userData));
        }

        async function callIA(sys, usr, tokens) {
            const key = localStorage.getItem('ai_key');
            if(!key) { openConfig(); throw new Error("Falta API Key"); }
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{role:"system", content:sys}, {role:"user", content:usr}],
                    response_format: { type: "json_object" },
                    max_tokens: tokens
                })
            });
            const data = await response.json();
            return JSON.parse(data.choices[0].message.content);
        }

        // Funciones auxiliares
        function updateBlock(i, field, val) { userData.blocks[i][field] = val; localStorage.setItem('aivantage_data', JSON.stringify(userData)); }
        function deleteBlock(i) { userData.blocks.splice(i,1); renderAll(); }
        function addManualBlock() { userData.blocks.unshift({header: "Empresa - Cargo (Año)", logros: "• Nuevo logro"}); renderAll(); }
        function openConfig() { document.getElementById('configModal').style.display='block'; }
        function closeConfig() { document.getElementById('configModal').style.display='none'; }
        function saveApiKey() { localStorage.setItem('ai_key', document.getElementById('apiKeyInput').value); closeConfig(); }
        function showLoading(m) { document.getElementById('loadingOverlay').style.display='flex'; document.getElementById('loadingStatus').innerText=m; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display='none'; document.getElementById('voiceModal').style.display='none'; }
        function closeVoiceModal() { document.getElementById('voiceModal').style.display='none'; hideLoading(); }

        async function decodificarJD() {
            const jd = document.getElementById('targetDesc').value;
            showLoading("Analizando Vacante...");
            try {
                const res = await callIA(`Analiza la JD. JSON: {score:0, resumen_puesto:'', nombres_alternativos:'', match_skills:[], gaps:[]}`, jd, 1000);
                document.getElementById('matchScoreDisplay').innerText = `Match: ${res.score}%`;
                document.getElementById('matchScoreDisplay').style.display = 'block';
                document.getElementById('skillsContainer').innerHTML = `
                    <div style="background:#eaf4f9; padding:10px; border-radius:5px; font-size:0.9em; margin-bottom:10px;">
                        <strong>Rol:</strong> ${res.resumen_puesto}<br>
                        <strong>Alias:</strong> ${res.nombres_alternativos}
                    </div>
                `;
            } catch(e) { alert(e.message); }
            hideLoading();
        }
    </script>
</body>
</html>
