<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiVantage | Career Co-Pilot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        :root { --ai-blue: #005587; --ai-light-blue: #eaf4f9; --text-main: #2c3e50; --border: #e2e8f0; --bg-app: #f8fafc; --danger: #e53e3e; --success: #2f855a; --warning: #c05621; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-app); margin: 0; color: var(--text-main); }
        .navbar, .toolbar, .tabs, .target-panel, .block-controls, .tool-btn, .tab, #userSelector { display: flex; }
        .navbar { justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .toolbar { background: white; padding: 10px 40px; border-bottom: 1px solid var(--border); display: none; gap: 10px; align-items: center; position: sticky; top: 72px; z-index: 99; flex-wrap: wrap; }
        .tool-btn { background: white; border: 1px solid var(--border); padding: 8px 12px; border-radius: 8px; cursor: pointer; align-items: center; gap: 6px; font-size: 0.82em; font-weight: 600; }
        .btn-primary { background: var(--ai-blue) !important; color: white !important; border: none; }
        .btn-mic.recording { background: var(--danger) !important; color: white !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .main-layout { display: none; grid-template-columns: 1fr 380px; gap: 25px; padding: 20px 40px; max-width: 1200px; margin: auto; }
        .block { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .input-header { border: none; border-bottom: 1px solid transparent; padding: 4px 0; outline: none; font-size: 1.05em; width: 100%; font-weight: 800; color: var(--ai-blue); background: transparent; }
        .editable-area { outline: none; min-height: 20px; font-size: 0.9em; line-height: 1.7; white-space: pre-wrap; }
        .skill-tag { padding: 4px 10px; border-radius: 6px; font-size: 0.75em; font-weight: 700; margin: 2px; display: inline-block; border: 1px solid transparent; }
        .skill-tech { background: #ebf8ff; color: #2b6cb0; border-color: #bee3f8; }
        .skill-soft { background: #f0fff4; color: #2f855a; border-color: #c6f6d5; }
        .skill-lang { background: #fffaf0; color: #9c4221; border-color: #feebc8; }
        .skill-gap { background: #fff5f5; color: #c53030; border-color: #feb2b2; text-decoration: underline; }

        /* Estilo para el modal de decisión de voz */
        #voiceModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 2000; width: 320px; text-align: center; border: 1px solid var(--ai-blue); }

        @media print {
            .navbar, .toolbar, .tabs, .target-panel, .block-controls, .tool-btn, #loadingOverlay, .merge-check, #voiceModal { display: none !important; }
            body { background: white; }
            .main-layout { display: block; padding: 0; max-width: 100%; }
            .block { border: none; padding: 10px 0; margin-bottom: 5px; page-break-inside: avoid; }
            .input-header { color: black; font-size: 1.2em; }
            .skill-tag { border: 1px solid #ccc; color: black; background: white; }
        }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <i class="fas fa-cog fa-spin" style="font-size: 3em; color: var(--ai-blue);"></i>
        <p id="loadingStatus" style="margin-top: 15px; font-weight: 700;">AiVantage: Procesando...</p>
    </div>

    <div id="voiceModal">
        <h4 style="margin-top:0; color: var(--ai-blue);">Transcripción Lista</h4>
        <p id="voicePreview" style="font-size:0.85em; background:#f1f1f1; padding:10px; border-radius:8px; max-height:80px; overflow-y:auto; font-style:italic;"></p>
        <p style="font-size:0.8em; font-weight:700;">¿Dónde quieres añadir esto?</p>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="tool-btn btn-primary" onclick="processVoiceAction('exp')">Nueva Exp.</button>
            <button class="tool-btn" onclick="processVoiceAction('sum')">Resumen</button>
        </div>
        <button style="margin-top:15px; background:none; border:none; color:gray; cursor:pointer; font-size:0.7em;" onclick="closeVoiceModal()">Cancelar</button>
    </div>

    <nav class="navbar">
        <div style="font-weight: 800; color: var(--ai-blue); font-size: 1.3em;">AiVantage</div>
        <div id="matchScoreDisplay" style="display:none; font-weight:800; color:var(--success);">Match: 0%</div>
        <div id="userDisplay" style="font-weight: 700; color: gray;"></div>
    </nav>

    <div id="userSelector" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh;">
        <h2>Inicia tu sesión</h2>
        <div style="display: flex; gap: 20px;">
            <div onclick="selectUser('Gustavo')" style="background:white; padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:150px; cursor:pointer;">
                <i class="fas fa-user-tie" style="font-size: 2.5em; color: var(--ai-blue);"></i><h3>Gustavo</h3>
            </div>
            <div onclick="selectUser('Invitado')" style="background:white; padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:150px; cursor:pointer;">
                <i class="fas fa-user-friends" style="font-size: 2.5em; color: #718096;"></i><h3>Invitada</h3>
            </div>
        </div>
    </div>

    <div id="toolbar" class="toolbar">
        <button class="tool-btn btn-mic" id="btnDeepDiveGeneral" onclick="startDeepDive()"><i class="fas fa-microphone"></i> Deep Dive</button>
        <button class="tool-btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-file-upload"></i> Cargar CVs</button>
        <input type="file" id="fileInput" style="display:none" accept=".pdf,.docx" multiple onchange="handleFileUpload(event)">
        <button class="tool-btn" onclick="addManualBlock('exp')"><i class="fas fa-plus"></i> Exp.</button>
        <button class="tool-btn" onclick="addManualBlock('edu')"><i class="fas fa-graduation-cap"></i> Edu.</button>
        <button id="btnCombinar" class="tool-btn btn-primary" style="display:none" onclick="combinarBloques()"><i class="fas fa-object-group"></i> Combinar (IA)</button>
        <select id="outLang" class="tool-btn"><option value="es">ESP</option><option value="en">ENG</option></select>
        <button class="tool-btn btn-primary" onclick="window.print()"><i class="fas fa-file-pdf"></i> Generar CV Final</button>
    </div>

    <div id="mainLayout" class="main-layout">
        <div id="perfilView">
            <div class="block">
                <div class="block-controls" style="justify-content: space-between;">
                    <div style="font-size: 0.7em; font-weight: 800; color: var(--ai-blue);">RESUMEN</div>
                    <button class="tool-btn btn-primary" style="padding: 4px 8px; font-size: 0.7em;" onclick="refinarResumen()"><i class="fas fa-magic"></i> Refinar IA</button>
                </div>
                <div id="summaryArea" class="editable-area" contenteditable="true" onblur="updateProfileData('summary', this.innerText)"></div>
            </div>
            <div id="blocksExp"></div>
            <div style="margin: 15px 0; font-weight: 800; font-size: 0.8em; color: gray; text-transform: uppercase;">Educación e Idiomas</div>
            <div id="blocksEdu"></div>
        </div>

        <div class="target-panel" style="flex-direction: column; gap: 15px;">
            <div class="block">
                <div style="font-size: 0.7em; font-weight: 800; color: var(--ai-blue); margin-bottom: 8px;">ANALIZADOR DE VACANTE</div>
                <textarea id="targetDesc" style="width:100%; height:100px; border:1px solid var(--border); border-radius:8px; font-size:0.8em; padding:8px;" placeholder="Pega la JD aquí..."></textarea>
                <button style="width:100%; margin-top:10px; padding:8px; background:var(--ai-blue); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;" onclick="decodificarJD()">Decodificar Match</button>
            </div>
            <div id="skillsContainer"></div>
            <div id="gapAlert" style="display:none; padding:12px; background:#fff5f5; border-radius:8px; border:1px solid #feb2b2; font-size:0.8em; color:#c53030;"></div>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let currentUser = "";
        let userData = { summary: "", blocks: [], edu: [], skills: [] };
        
        /* Lógica de Voz (Deep Dive) CORREGIDA */
        let recognition;
        let lastTranscript = "";
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        lastTranscript += event.results[i][0].transcript;
                    }
                }
            };

            recognition.onerror = (event) => {
                document.getElementById('btnDeepDiveGeneral').classList.remove('recording');
                alert("Error de micrófono: " + event.error + ". Asegúrate de dar permisos o usar Localhost.");
            };
        }

        function startDeepDive() {
            const btn = document.getElementById('btnDeepDiveGeneral');
            if (!SpeechRecognition) {
                alert("Tu navegador no soporta dictado por voz. Usa Chrome.");
                return;
            }

            if (btn.classList.contains('recording')) {
                recognition.stop();
                btn.classList.remove('recording');
                setTimeout(() => {
                    if(lastTranscript.trim().length > 0) {
                        showVoiceDecision();
                    } else {
                        alert("No se detectó voz. Intenta hablar más claro.");
                    }
                }, 500);
            } else {
                lastTranscript = "";
                try {
                    recognition.start();
                    btn.classList.add('recording');
                } catch (e) {
                    btn.classList.remove('recording');
                    console.error(e);
                }
            }
        }

        function showVoiceDecision() {
            const modal = document.getElementById('voiceModal');
            document.getElementById('voicePreview').innerText = `"${lastTranscript}"`;
            modal.style.display = 'block';
        }

        function closeVoiceModal() { document.getElementById('voiceModal').style.display = 'none'; }

        async function processVoiceAction(target) {
            closeVoiceModal();
            showLoading("IA procesando tu voz...");
            try {
                if(target === 'exp') {
                    const res = await callIA(`Convierte este dictado de voz en un bloque de experiencia profesional formal. REGLA: Un bullet por renglón con •. JSON: {header:'', logros:''}`, lastTranscript, 800);
                    userData.blocks.unshift(res);
                } else {
                    const res = await callIA(`Convierte este dictado en un fragmento para el resumen ejecutivo. JSON: {text:''}`, lastTranscript, 500);
                    userData.summary = (userData.summary + "\n" + res.text).trim();
                }
                guardar(); renderAll();
            } catch(e) { alert("Error procesando voz: " + e.message); }
            hideLoading();
        }

        /* RESTO DE FUNCIONES MANTENIDAS INTACTAS */
        function selectUser(name) {
            currentUser = name;
            document.getElementById('userSelector').style.display = 'none';
            document.getElementById('toolbar').style.display = 'flex';
            document.getElementById('mainLayout').style.display = 'grid';
            document.getElementById('userDisplay').innerText = currentUser;
            const saved = localStorage.getItem('aivantage_' + currentUser);
            if (saved) {
                userData = JSON.parse(saved);
                if (!Array.isArray(userData.blocks)) userData.blocks = [];
                if (!Array.isArray(userData.edu)) userData.edu = [];
            }
            renderAll();
        }

        async function refinarResumen() {
            const jd = document.getElementById('targetDesc').value;
            if(!userData.summary) return;
            showLoading("Refinando resumen ejecutivo...");
            try {
                const res = await callIA(`Eres Gustavo. Analiza los resúmenes acumulados y la JD. Crea UN SOLO resumen ejecutivo de alto impacto (máx 5 líneas) combinando tus 20 años de experiencia con las keywords de la vacante. JSON: {summary:''}`, `RESÚMENES: ${userData.summary} \n JD: ${jd}`, 1000);
                userData.summary = res.summary;
                guardar(); renderAll();
            } catch(e) { alert("Error al refinar: " + e.message); }
            hideLoading();
        }

        async function combinarBloques() {
            const seleccionados = Array.from(document.querySelectorAll('.merge-check:checked')).map(cb => parseInt(cb.dataset.index));
            if(seleccionados.length < 2) return;
            showLoading("Combinando y optimizando bloques...");
            const dataToMerge = seleccionados.map(idx => userData.blocks[idx]);
            try {
                const res = await callIA(`Combina estos bloques duplicados en UNO SOLO coherente. Elige las versiones con mejores resultados cuantitativos. REGLA: Cada logro debe empezar con • y salto de línea. JSON: {header:'', logros:''}`, JSON.stringify(dataToMerge), 1200);
                seleccionados.sort((a,b) => b-a).forEach(idx => userData.blocks.splice(idx, 1));
                userData.blocks.unshift(res);
                guardar(); renderAll();
            } catch(e) { alert("Error al combinar: " + e.message); }
            hideLoading();
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            
            showLoading("Procesando CV...");
            
            try {
                for (let file of files) {
                    // Leer el archivo localmente
                    const text = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = async function() {
                            try {
                                if (file.name.toLowerCase().endsWith(".pdf")) {
                                    const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
                                    let fullT = "";
                                    for (let i=1; i<=pdf.numPages; i++) {
                                        const p = await pdf.getPage(i);
                                        const c = await p.getTextContent();
                                        fullT += c.items.map(it => it.str).join(" ");
                                    }
                                    resolve(fullT);
                                } else if (file.name.toLowerCase().endsWith(".docx")) {
                                    const res = await mammoth.extractRawText({arrayBuffer: this.result});
                                    resolve(res.value);
                                } else {
                                    reject(new Error("Formato no soportado. Usa PDF o DOCX."));
                                }
                            } catch (err) { reject(err); }
                        };
                        reader.onerror = () => reject(new Error("Error al leer el archivo físico."));
                        reader.readAsArrayBuffer(file);
                    });

                    // Llamada a la IA (Tu lógica original de callIA)
                    const res = await callIA(`Extrae datos profesionales. REGLA ESTRICTA: Cada logro en 'logros' debe empezar con • y un salto de línea. JSON: {summary:'', blocks:[{header:'', logros:''}], edu:[{header:'', detalle:''}], skills:[{name:'', type:'tech|soft|lang'}]}`, text, 1500);
                    
                    if(res.summary && !userData.summary.includes(res.summary)) {
                        userData.summary = (userData.summary + "\n" + res.summary).trim();
                    }
                    if(res.blocks) userData.blocks = [...res.blocks, ...userData.blocks];
                    if(res.edu) userData.edu = [...res.edu, ...userData.edu];
                    if(res.skills) userData.skills = [...res.skills, ...userData.skills];
                    
                    guardar(); 
                    renderAll();
                }
            } catch(e) { 
                console.error(e);
                alert("Error en carga: " + e.message); 
            } finally {
                hideLoading();
                event.target.value = ''; // Limpiar el input
            }
        }

        async function decodificarJD() {
            const jd = document.getElementById('targetDesc').value;
            if(!jd) return;
            showLoading("Analizando Match Score...");
            try {
                const promptPerfil = `RESUMEN: ${userData.summary}. EXP: ${JSON.stringify(userData.blocks)}. EDU: ${JSON.stringify(userData.edu)}. SKILLS: ${JSON.stringify(userData.skills)}`;
                const res = await callIA(`Compara mi perfil con la JD. JSON: {score:85, match_skills:[{name:'', type:'tech'}], gaps:[{name:'', advice:''}]}`, `PERFIL: ${promptPerfil} \n JD: ${jd}`, 2000);
                document.getElementById('matchScoreDisplay').innerText = `Match: ${res.score}%`;
                document.getElementById('matchScoreDisplay').style.display = 'block';
                let html = "";
                if(res.match_skills) res.match_skills.forEach(s => html += `<span class="skill-tag skill-${s.type}">${s.name}</span>`);
                if(res.gaps) res.gaps.forEach(g => html += `<span class="skill-tag skill-gap" title="${g.advice}">${g.name}</span>`);
                document.getElementById('skillsContainer').innerHTML = html;
                if(res.gaps && res.gaps.length > 0) {
                    document.getElementById('gapAlert').style.display = 'block';
                    document.getElementById('gapAlert').innerHTML = `<b>Gaps:</b><br>` + res.gaps.map(g => `• ${g.name}: ${g.advice}`).join('<br>');
                }
            } catch(e) { alert("Error de Match: " + e.message); }
            hideLoading();
        }

        async function callIA(sys, usr, tokens) {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [{ role: "system", content: "ERES GUSTAVO. Primera persona. Logros con '•'. JSON obligatorio. " + sys }, { role: "user", content: usr }],
                    response_format: { type: "json_object" },
                    max_tokens: tokens,
                    temperature: 0.3
                })
            });
            const data = await response.json();
            if(!response.ok) throw new Error(data.error.message);
            return JSON.parse(data.choices[0].message.content);
        }

        function renderBlocks() {
            const expCont = document.getElementById('blocksExp');
            const eduCont = document.getElementById('blocksEdu');
            expCont.innerHTML = ""; eduCont.innerHTML = "";
            userData.blocks.forEach((b, i) => {
                expCont.innerHTML += `<div class="block"><div class="block-controls">
                <input type="checkbox" class="merge-check" data-index="${i}" onchange="toggleMergeBtn()">
                <button style="border:none; background:none; color:gray; cursor:pointer;" onclick="deleteItem('blocks', ${i})"><i class="fas fa-trash"></i></button></div>
                <input class="input-header" value="${b.header || ''}" onblur="updateItem('blocks', ${i}, 'header', this.value)">
                <div class="editable-area" contenteditable="true" onblur="updateItem('blocks', ${i}, 'logros', this.innerText)">${b.logros || ''}</div></div>`;
            });
            userData.edu.forEach((e, i) => {
                eduCont.innerHTML += `<div class="block"><div class="block-controls"><span></span><button style="border:none; background:none; color:gray; cursor:pointer;" onclick="deleteItem('edu', ${i})"><i class="fas fa-trash"></i></button></div>
                <input class="input-header" value="${e.header || ''}" onblur="updateItem('edu', ${i}, 'header', this.value)">
                <div class="editable-area" contenteditable="true" onblur="updateItem('edu', ${i}, 'detalle', this.innerText)">${e.detalle || ''}</div></div>`;
            });
            renderSkills();
        }

        function renderSkills() {
            if (Array.isArray(userData.skills)) {
                document.getElementById('skillsContainer').innerHTML = userData.skills.map(s => `<span class="skill-tag skill-${s.type || 'tech'}">${s.name}</span>`).join('');
            }
        }

        function toggleMergeBtn() {
            const count = document.querySelectorAll('.merge-check:checked').length;
            document.getElementById('btnCombinar').style.display = count >= 2 ? 'inline-flex' : 'none';
        }

        function updateItem(l, i, f, v) { userData[l][i][f] = v; guardar(); }
        function updateProfileData(f, v) { userData[f] = v; guardar(); }
        function deleteItem(l, i) { userData[l].splice(i,1); guardar(); renderBlocks(); }
        function addManualBlock(t) { 
            if(t==='exp') userData.blocks.unshift({header:'Nueva Empresa', logros:'• '}); 
            else userData.edu.unshift({header:'Nueva Educación', detalle:''}); 
            renderBlocks(); guardar();
        }
        function showLoading(m) { document.getElementById('loadingOverlay').style.display='flex'; document.getElementById('loadingStatus').innerText = m; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display='none'; }
        function renderAll() { renderBlocks(); document.getElementById('summaryArea').innerText = userData.summary || ""; }
        function guardar() { localStorage.setItem('aivantage_' + currentUser, JSON.stringify(userData)); }
    </script>
</body>
</html>
